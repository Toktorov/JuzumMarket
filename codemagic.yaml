# Codemagic CI/CD — сборка JUZUM для Google Play.
#
# ПЕРЕД первым запуском загрузите релизный keystore в Codemagic:
#   Codemagic → (Teams/App) Settings → Code signing identities → Android keystores
#   • Reference name:     juzum_keystore   (должно совпадать с android_signing ниже)
#   • Keystore file:      android/app/upload-keystore.jks   (из репозитория он исключён —
#                         возьмите локальный файл и загрузите вручную)
#   • Keystore password:  juzumUpload2026
#   • Key alias:          upload
#   • Key password:       juzumUpload2026
#
# После этого нажмите «Check for configuration files» и запустите сборку.

workflows:
  android-release:
    name: JUZUM Android (Play Store AAB)
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      flutter: stable
      android_signing:
        - juzum_keystore
    cache:
      cache_paths:
        - $HOME/.pub-cache
    scripts:
      - name: Flutter packages
        script: flutter pub get
      - name: Настройка релизной подписи (key.properties)
        script: |
          cat > "$CM_BUILD_DIR/android/key.properties" <<EOF
          storePassword=$CM_KEYSTORE_PASSWORD
          keyPassword=$CM_KEY_PASSWORD
          keyAlias=$CM_KEY_ALIAS
          storeFile=$CM_KEYSTORE_PATH
          EOF
      - name: Сборка AAB (для Google Play)
        script: flutter build appbundle --release --build-number=$BUILD_NUMBER
      - name: Сборка APK (для теста на устройстве)
        script: flutter build apk --release --build-number=$BUILD_NUMBER
    artifacts:
      - build/**/outputs/bundle/**/*.aab
      - build/**/outputs/apk/**/*.apk
      - build/**/outputs/**/mapping.txt
    publishing:
      email:
        recipients:
          - toktorov2005@gmail.com
        notify:
          success: true
          failure: true
      # --- Автопубликация в Google Play (включите ПОСЛЕ настройки service account) ---
      # Загрузите JSON сервис-аккаунта в Codemagic как переменную
      # GCLOUD_SERVICE_ACCOUNT_CREDENTIALS, затем раскомментируйте:
      # google_play:
      #   credentials: $GCLOUD_SERVICE_ACCOUNT_CREDENTIALS
      #   track: internal
      #   submit_as_draft: true

  # ============================================================
  # iOS (App Store / TestFlight)
  #
  # ПЕРЕД первым запуском нужно (обязательно — подпись выдаёт Apple):
  #   1. Аккаунт Apple Developer Program ($99/год).
  #   2. Создать App Store Connect API key:
  #      App Store Connect → Users and Access → Integrations → App Store Connect API
  #      → сгенерировать ключ (роль App Manager). Скачать .p8, запомнить Issuer ID и Key ID.
  #   3. В Codemagic → Team settings → Integrations → App Store Connect
  #      → добавить этот ключ с Reference name: juzum_asc  (совпадает с integrations ниже).
  #   4. Bundle id su.bigbee.juzum: Codemagic создаст его сам по API-ключу
  #      (или зарегистрируйте вручную в Apple Developer).
  #   5. Создать приложение в App Store Connect (для загрузки в TestFlight/App Store).
  # ============================================================
  ios-release:
    name: JUZUM iOS (App Store / TestFlight)
    instance_type: mac_mini_m2
    max_build_duration: 60
    integrations:
      app_store_connect: juzum_asc
    environment:
      flutter: stable
      vars:
        BUNDLE_ID: "su.bigbee.juzum"
    cache:
      cache_paths:
        - $HOME/.pub-cache
    scripts:
      - name: Flutter packages
        script: flutter pub get
      - name: Подпись iOS — создаёт App ID, сертификат и профиль при отсутствии
        script: |
          keychain initialize
          # --create: если App ID / профиля / сертификата ещё нет — создать их.
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --create
          keychain add-certificates
          # Прописывает профили в проект и пишет ~/export_options.plist
          xcode-project use-profiles
      - name: Установка CocoaPods
        script: find . -name "Podfile" -execdir pod install \;
      - name: Сборка IPA
        script: |
          flutter build ipa --release \
            --build-number=$BUILD_NUMBER \
            --export-options-plist=/Users/builder/export_options.plist
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      email:
        recipients:
          - toktorov2005@gmail.com
        notify:
          success: true
          failure: true
      # --- Автозагрузка в TestFlight (включите ПОСЛЕ создания приложения в App Store Connect) ---
      # app_store_connect:
      #   auth: integration
      #   submit_to_testflight: true
      #   submit_to_app_store: false
